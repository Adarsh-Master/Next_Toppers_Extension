<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NextToppers Pro</title>
  <style>
    :root {
      --bg: #090a0f;
      --card: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.07);
      --muted: #8a99ad;
      --text: #f1f5f9;
      
      /* Glowing Theme Colors */
      --glow-master: 0 0 20px rgba(124, 92, 255, 0.4);
      --glow-poll: 0 0 20px rgba(245, 158, 11, 0.3);
      --glow-chat: 0 0 20px rgba(168, 85, 247, 0.3);
    }

    html, body {
      margin: 0; padding: 0;
      width: 320px; height: 360px;
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top right, #1a153a 0%, #06070a 60%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .container {
      padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
      animation: fadeIn 0.25s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
    }

    .brand-mark {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #7c5cff, #00f2fe);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #000; font-size: 14px;
      box-shadow: 0 0 15px rgba(124, 92, 255, 0.5);
    }

    h1 { font-size: 15px; margin: 0; font-weight: 700; letter-spacing: -0.3px; }
    p.subtitle { margin: 2px 0 0; font-size: 11px; color: var(--muted); }

    .action-stack {
      display: flex; flex-direction: column; gap: 12px;
    }

    /* Core Card Button Styling */
    button.panel-btn {
      border: 1px solid var(--border);
      padding: 14px; border-radius: 12px;
      color: var(--text); font-weight: 600; font-size: 13px;
      background: var(--card); backdrop-filter: blur(8px);
      cursor: pointer; text-align: left;
      display: flex; align-items: center; justify-content: space-between;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button.panel-btn .btn-meta {
      display: flex; flex-direction: column; gap: 2px;
    }

    button.panel-btn .btn-desc {
      font-size: 10.5px; color: var(--muted); font-weight: 400;
    }

    button.panel-btn .icon-badge {
      font-size: 18px; width: 32px; height: 32px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
    }

    /* Specific Row Highlighting Variants */
    button#masterButton {
      background: linear-gradient(95deg, rgba(124, 92, 255, 0.15), rgba(0, 242, 254, 0.05));
      border: 1px solid rgba(124, 92, 255, 0.3);
    }
    button#masterButton:hover {
      box-shadow: var(--glow-master);
      border-color: #7c5cff;
      transform: translateY(-2px);
    }
    button#masterButton .icon-badge { background: #7c5cff; color: white; }

    button.poll-variant:hover {
      box-shadow: var(--glow-poll);
      border-color: #f59e0b;
      background: rgba(245, 158, 11, 0.05);
      transform: translateY(-2px);
    }
    button.poll-variant:hover .icon-badge { background: #f59e0b; }

    button.chat-variant:hover {
      box-shadow: var(--glow-chat);
      border-color: #a855f7;
      background: rgba(168, 85, 247, 0.05);
      transform: translateY(-2px);
    }
    button.chat-variant:hover .icon-badge { background: #a855f7; }

    footer {
      margin-top: 4px; text-align: center;
      font-size: 10.5px; color: var(--muted);
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand-mark">NT</div>
      <div>
        <h1>NextToppers Pro</h1>
        <p class="subtitle">Aesthetic workspace engine</p>
      </div>
    </header>

    <div class="action-stack">
      <!-- Master Control -->
      <button id="masterButton" class="panel-btn">
        <div class="btn-meta">
          <span>⚡ Master Unlock</span>
          <div class="btn-desc">Activate Video speed, overlays & shortcuts</div>
        </div>
        <div class="icon-badge">🚀</div>
      </button>

      <!-- Auto Poll Selector -->
      <button id="enablePollShortcut" class="panel-btn poll-variant">
        <div class="btn-meta">
          <span>Auto Poll Handler</span>
          <div class="btn-desc">Queue option selection targets instantly [P]</div>
        </div>
        <div class="icon-badge">🗳️</div>
      </button>

      <!-- Auto Message Spam -->
      <button id="unlockCooldown" class="panel-btn chat-variant">
        <div class="btn-meta">
          <span>Auto Message Engine</span>
          <div class="btn-desc">Configure automated text broadcasts [S]</div>
        </div>
        <div class="icon-badge">💬</div>
      </button>
    </div>

    <footer>
      Shortcuts: 1/2/3 Speed • F Fullscreen • T Clock • Swipe Seek
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
